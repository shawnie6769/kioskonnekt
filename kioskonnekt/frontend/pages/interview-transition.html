<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KiosKonnekt - Preparing Interview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/kiosk.css">
<style>
  .transition-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(1200px 700px at 12% -8%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 55%),
      radial-gradient(900px 520px at 86% 108%, color-mix(in srgb, var(--teal) 18%, transparent), transparent 52%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }

  .transition-card {
    width: min(760px, 100%);
    padding: 34px 30px;
    border-radius: 22px;
    background: linear-gradient(160deg, color-mix(in srgb, var(--surface) 94%, transparent), color-mix(in srgb, var(--surface2) 92%, transparent));
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    text-align: center;
  }

  .pulse-ring {
    width: 118px;
    height: 118px;
    margin: 0 auto 20px;
    border-radius: 999px;
    position: relative;
    border: 2px solid color-mix(in srgb, var(--accent) 48%, transparent);
    box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 36%, transparent);
    animation: pulse 2s ease-out infinite;
  }

  .pulse-ring::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--teal) 75%, #fff), var(--accent) 70%);
    box-shadow:
      inset 0 0 24px color-mix(in srgb, var(--teal) 32%, transparent),
      0 0 34px color-mix(in srgb, var(--accent) 44%, transparent);
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 35%, transparent); }
    70% { box-shadow: 0 0 0 28px color-mix(in srgb, var(--accent) 0%, transparent); }
    100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent); }
  }

  .scan-label {
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border));
    background: color-mix(in srgb, var(--accent) 11%, transparent);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .dots {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 70%, transparent);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .status-text {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text3);
  }

  @media (max-width: 640px) {
    .transition-card {
      padding: 26px 20px;
      border-radius: 18px;
    }

    .status-text { font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="transition-shell">
    <div class="transition-card anim-fade-up">
      <div class="pulse-ring" aria-hidden="true"></div>
      <div class="section-eyebrow" style="color:var(--teal);">Step 3 of 4</div>
      <h1 style="font-size:clamp(1.6rem, 2.6vw, 2.2rem);font-weight:800;letter-spacing:-0.02em;line-height:1.15;margin-top:8px;">
        Please wait...
      </h1>
      <p style="margin-top:10px;color:var(--text2);font-size:15px;line-height:1.6;">
        Scanning Documents
      </p>

      <div class="scan-label">Initializing Interview Assistant</div>

      <div class="dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="status-text" id="status-text">Your interview will begin shortly.</div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireSession()) {
      // requireSession handles redirect to '/'
    }

    const DELAY_MS = 90000;
    const TARGET_PATH = '/interview';
    const endAt = Date.now() + DELAY_MS;

    function updateUI() {
      const now = Date.now();
      const remaining = Math.max(0, endAt - now);

      if (remaining <= 0) {
        window.clearInterval(timer);
        navigateTo(TARGET_PATH);
      }
    }

    updateUI();
    const timer = window.setInterval(updateUI, 200);
  </script>
</body>
</html>
